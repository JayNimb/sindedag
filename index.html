<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sindedag Multiplayer</title>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a; --border-color: #334155; --text-main: #f1f5f9; --text-muted: #94a3b8; --color-primary: #6366f1; --color-danger: #ef4444; --color-amber: #f59e0b; --linkedin-blue: #0077b5; --color-success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, sans-serif; }
        .view-section { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; background: var(--bg-input); color: #fff; margin-bottom: 10px; }
        button { background: var(--color-primary); font-weight: bold; cursor: pointer; border: none; }
        .btn-danger { background: var(--color-danger); }
        .btn-amber { background: var(--color-amber); }
        .hidden { display: none !important; }
        .version-tag { position: fixed; bottom: 5px; right: 5px; color: #475569; font-size: 10px; font-family: monospace; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDkCtIKu8RLVrDLYRywXtXokcqtImJHICM",
            databaseURL: "https://sindedag-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sindedag"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Ved opstart: vis menuen
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('view-mode-selection').style.display = 'block';
        });

        window.selectMode = (mode) => {
            document.getElementById('view-mode-selection').style.display = 'none';
            document.getElementById(`view-${mode}-login`).style.display = 'block';
        };

        window.connectToRoom = (mode) => {
            const room = document.getElementById(`room-${mode}`).value.toUpperCase().trim();
            if(!room) return alert("Indtast rumkode");
            document.getElementById(`view-${mode}-login`).style.display = 'none';
            document.getElementById(`view-${mode}-main`).style.display = 'block';
            onValue(ref(db, `rooms/${room}`), (snapshot) => { /* Render logik */ });
        };
    </script>
</head>
<body>
    <div id="view-mode-selection" class="view-section">
        <div class="card" style="text-align: center;">
            <h1>SINDEDAG</h1>
            <button onclick="selectMode('player')">📱 Ansat</button>
            <button onclick="selectMode('gd')">💼 Generaldirektør</button>
        </div>
    </div>

    <!-- Login zoner -->
    <div id="view-player-login" class="view-section"><div class="card"><h2>Log ind</h2><input id="room-player" placeholder="Rumkode"><button onclick="connectToRoom('player')">Start</button></div></div>
    <div id="view-gd-login" class="view-section"><div class="card"><h2>GD Login</h2><input id="room-gd" placeholder="Rumkode"><button onclick="connectToRoom('gd')">Start</button></div></div>
    
    <!-- Hovedskærme -->
    <div id="view-player-main" class="view-section"><div class="card"><h2>Spiller dashboard</h2></div></div>
    <div id="view-gd-main" class="view-section"><div class="card"><h2>GD Dashboard</h2></div></div>

    <div class="version-tag">v1.1</div>
</body>
</html>
