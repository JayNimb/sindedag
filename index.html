<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sindedag Multiplayer v1.6</title>
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
            --border-color: #334155; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --color-primary: #6366f1; --color-danger: #ef4444; --color-amber: #f59e0b;
            --linkedin-blue: #0077b5; --color-success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        .view-section { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; position: relative; }
        h1, h2, h3 { margin: 0 0 10px 0; }
        
        input[type="text"], select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; background: var(--bg-input); color: #fff; margin-bottom: 10px; }
        button { background: var(--color-primary); font-weight: bold; cursor: pointer; border: none; }
        button:active { opacity: 0.8; }
        .btn-danger { background: var(--color-danger); }
        .btn-amber { background: var(--color-amber); }
        .btn-success { background: var(--color-success); }
        .btn-select { background: #334155; padding: 20px; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hidden { display: none !important; }
        
        .flex-row { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
        .room-badge { background: #334155; color: #fff; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-family: monospace; display: inline-block; }
        
        .role-grid { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .role-grid input[type="checkbox"] { width: 24px; height: 24px; margin: 0; padding: 0; cursor: pointer; accent-color: var(--color-primary); }
        .role-grid input[type="number"] { width: 70px; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-input); color: #fff; text-align: center; font-size: 16px; margin: 0; }
        .role-grid label { cursor: pointer; font-size: 15px; user-select: none; }

        .li-post { background: #2b394f; border-left: 4px solid var(--linkedin-blue); padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        .li-name { font-weight: bold; color: #6bf; font-size: 14px; }
        .li-text { font-size: 13px; margin-top: 4px; }
        
        /* OVERLAYS & ANIMATIONS */
        .overlay-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; animation: fadeIn 0.3s forwards; }
        .overlay-night { background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(10px); }
        .overlay-strategy { background: rgba(99, 102, 241, 0.95); animation: flashBg 2s infinite alternate; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flashBg { from { background: rgba(99, 102, 241, 0.95); } to { background: rgba(79, 70, 229, 0.95); } }
        @keyframes flashRed { from { background: #ef4444; } to { background: #991b1b; } }
        
        /* 🖥️ STORSKÆRM */
        .storskærm-layout { 
            grid-template-columns: 1fr 1.2fr 1.2fr; 
            gap: 20px; max-width: 100vw; height: 96vh; margin: 2vh auto; padding: 0 20px; align-items: stretch;
        }
        #screen-player-list, #screen-linkedin-feed { height: 75vh; overflow-y: auto; padding-right: 4px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .badge-title { background: var(--color-amber); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-left: 4px;}
        
        .gd-nav-bar { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); padding-bottom: 16px; }
        .wakeup-list li { margin-bottom: 10px; font-size: 15px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }

        /* Rolle-leksikon */
        details summary { cursor: pointer; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; font-weight: bold; border: 1px solid var(--border-color); list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        .lexicon-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #334155; }
        .lexicon-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .version-tag { position: fixed; bottom: 5px; right: 5px; color: #475569; font-size: 12px; font-weight: bold; font-family: monospace; z-index: 9999; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkCtIKu8RLVrDLYRywXtXokcqtImJHICM",
            authDomain: "sindedag.firebaseapp.com",
            databaseURL: "https://sindedag-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "sindedag",
            storageBucket: "sindedag.firebasestorage.app",
            messagingSenderId: "405522362117",
            appId: "1:405522362117:web:f2020173dc6227918c916c",
            measurementId: "G-2R3F13JHWD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRoom = "";
        let myPlayerId = localStorage.getItem("myPlayerId") || "p_" + Math.random().toString(36).substr(2, 5);
        localStorage.setItem("myPlayerId", myPlayerId);
        let myName = "";
        let viewMode = ""; 
        let globalPlayers = {};
        let isRoleVisible = false;
        
        let localNyStrategiVersion = 0; 
        let strategyPopupTimeout = null;

        const roleDescriptions = {
            "Mellemleder": "💼 Sørg for ikke at blive udpeget af medarbejderne. Hver gang I tager på seminar, 'tilpasser' I og fyrer en medarbejder.",
            "Praktikant": "☕ Du er fuldstændig IMMUN over for mellemledernes fyringer om natten. Men du kan blive fyret om dagen, eller som syndebuk. Du må IKKE italesætte din rolle!",
            "Kåre": "🤪 Du er så træt af dit job og vil bare gerne fyres! Du vinder spillet MED DET SAMME, hvis det lykkes dig at blive fyret.",
            "HR Medarbejder": "📋 Under hvert seminar må du pege på en person for at få bekræftet af Generaldirektøren, om de er Mellemleder.",
            "Områdedirektør": "👑 Hvis mellemlederne forsøger at fyre dig om natten, overlever du. I stedet vælger du nat 1 en syndebuk, der tager faldet for dig.",
            "Tillidsrepræsentant": "🤝 Du må smugkigge under seminarerne (om natten) for at se, hvem mellemlederne er – men pas på!",
            "Den eksterne konsulent fra PWC": "🕵️‍♂️ Du kan 1 GANG i hele spillet vælge at redde en person fra en natlig fyring ELLER vælge en, der skal fyres i stedet.",
            "Ditte": "📣 Du er øverste leder! På første nat vælger du en anden spiller, som forfremmes til din ekstra Mellemleder.",
            "Julefrokostpar": "❤️ Du har haft et engangsknald, men kan ikke huske med hvem! I vinder hvis I finder hinanden og erklærer kærligheden foran alle. Gætter du forkert, ryger du ud!",
            "Gitte": "🤫 Dittes PA. Spiller med ledelsen, kender dem ikke, vækkes ikke om natten.",
            "Ham der fra 5000": "💻 IT. Kan én gang (fra nat 2) tvinge en spiller til at opdatere, så de bliver 'muted' næste dag.",
            "Bestyrelsesmedlem": "💼 (Uddeles af GD). Du har altid 2 stemmer i dagtimerne. Kan én gang afsløre alle afdødes roller."
        };

        const allAvailableRoles = ["Mellemleder", "Praktikant", "Kåre", "HR Medarbejder", "Områdedirektør", "Tillidsrepræsentant", "Den eksterne konsulent fra PWC", "Ditte", "Gitte", "Ham der fra 5000", "Julefrokostpar", "Medarbejder"];

        function initMenu() {
            const startMenu = document.getElementById('view-mode-selection');
            if(startMenu) startMenu.style.display = 'block';
            
            // Populer Rolle-leksikon dynamisk
            const lexiconDiv = document.getElementById('lexicon-content');
            if (lexiconDiv && lexiconDiv.innerHTML === "") {
                let html = "";
                for (const [role, desc] of Object.entries(roleDescriptions)) {
                    html += `<div class="lexicon-item"><strong style="color:var(--color-amber);">${role}</strong><br>${desc}</div>`;
                }
                lexiconDiv.innerHTML = html;
            }
        }
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", initMenu);
        else initMenu();

        window.selectMode = function(mode) {
            viewMode = mode;
            document.getElementById('view-mode-selection').style.display = 'none';
            document.getElementById(`view-${mode}-login`).style.display = 'block';
        };

        window.connectToRoom = function(mode) {
            const roomInput = document.getElementById(`room-${mode}`).value.toUpperCase().trim();
            if(!roomInput) return alert("Skriv en rumkode!");
            currentRoom = roomInput;
            document.querySelectorAll('.display-room-code').forEach(el => el.innerText = currentRoom);

            if (mode === 'player') {
                myName = document.getElementById('player-name').value.trim();
                if(!myName) return alert("Skriv dit navn!");
                
                // ROBUST REJOIN: Tjek om spilleren allerede findes i Firebase i dette rum
                get(ref(db, `rooms/${currentRoom}/players/${myPlayerId}`)).then(snap => {
                    if(snap.exists()) {
                        myName = snap.val().name; // Overskriv med navnet fra databasen for en sikkerheds skyld
                    } else {
                        set(ref(db, `rooms/${currentRoom}/players/${myPlayerId}`), {
                            name: myName, role: "Ufordelt", isAlive: true
                        });
                    }
                    startFirebaseListener();
                });
            } else {
                startFirebaseListener();
            }

            document.getElementById(`view-${mode}-login`).style.display = 'none';
            if (mode === 'screen') document.getElementById('view-screen-main').style.display = 'grid';
            else document.getElementById(`view-${mode}-main`).style.display = 'block';
        };

        function startFirebaseListener() {
            onValue(ref(db, `rooms/${currentRoom}`), (snapshot) => {
                const data = snapshot.val() || {};
                renderGame(data);
            });
        }

        function renderGame(data) {
            const players = data.players || {};
            globalPlayers = players; 
            const status = data.status || { phase: "SETUP", timer: 0, timerRunning: false, nyStrategiVersion: 0, tjenestemandId: "", usedPWC: false };
            const chat = data.linkedin || {};
            
            const boardMemberId = data.boardMemberId || "";
            const boardMemberRevealed = data.boardMemberRevealed || false;
            const ditteChoiceDone = data.ditteChoiceDone || false;
            const scapegoatId = data.scapegoatId || "";
            const activeCount = Object.values(players).filter(p => p.isAlive).length || 0;

            if (status.nyStrategiVersion > localNyStrategiVersion && status.phase === "SINDEDAG (DAG)") {
                localNyStrategiVersion = status.nyStrategiVersion;
                triggerStrategyPopup();
            }

            // OPPDATER TIMER PÅ ALLE SKÆRME
            const mins = Math.floor(status.timer / 60).toString().padStart(2, '0');
            const secs = (status.timer % 60).toString().padStart(2, '0');
            const timerStr = `${mins}:${secs}`;
            if(document.getElementById('big-timer-display')) document.getElementById('big-timer-display').innerText = timerStr;
            if(document.getElementById('gd-timer-display')) document.getElementById('gd-timer-display').innerText = timerStr;
            if(document.getElementById('player-timer-display')) document.getElementById('player-timer-display').innerText = timerStr;

            // --- 1. MOBIL SPILER INTERFACE ---
            if (viewMode === 'player') {
                const me = players[myPlayerId];
                if (!me || !me.name) return;

                const bmZone = document.getElementById('player-bm-zone');
                if (boardMemberId === myPlayerId && me.isAlive) {
                    bmZone.classList.remove('hidden');
                    bmZone.innerHTML = `
                        <div style="background:var(--color-amber); color:#000; padding:10px; border-radius:6px; font-weight:bold; text-align:center; margin-bottom:10px;">💼 DU ER BESTYRELSESMEDLEM (2 STEMMER)</div>
                        ${!boardMemberRevealed ? '<button onclick="triggerBoardReveal()" style="background:#10b981; font-size:14px; padding:10px;">🔍 Vend alle fyrede medarbejders kort (1 gang)</button>' : ''}
                    `;
                } else if (boardMemberId === myPlayerId && !me.isAlive) {
                    bmZone.classList.remove('hidden');
                    let options = Object.keys(players).filter(id => players[id].isAlive).map(id => `<option value="${id}">${players[id].name}</option>`).join('');
                    bmZone.innerHTML = `<select id="bm-transfer-select">${options}</select><button onclick="transferBoardMember()" style="background:var(--color-amber); font-size:14px;">Overdrag mandat</button>`;
                } else {
                    bmZone.classList.add('hidden');
                }

                if (me.isAlive) {
                    document.getElementById('player-status-alive').classList.remove('hidden');
                    document.getElementById('player-status-dead').classList.add('hidden');
                    
                    if(me.role === "Ufordelt" || status.phase === "SETUP" || status.phase === "LOBBY_APPROVAL") {
                        document.getElementById('player-wait-zone').classList.remove('hidden');
                        document.getElementById('player-role-hidden-zone').classList.add('hidden');
                        document.getElementById('player-role-revealed-zone').classList.add('hidden');
                    } else {
                        document.getElementById('player-wait-zone').classList.add('hidden');
                        
                        // Action Alert System
                        let hasPendingAction = false;
                        if (me.role === "Områdedirektør" && !scapegoatId) hasPendingAction = true;
                        if (me.role === "Ditte" && !ditteChoiceDone) hasPendingAction = true;

                        if (isRoleVisible) {
                            document.getElementById('player-role-hidden-zone').classList.add('hidden');
                            document.getElementById('player-role-revealed-zone').classList.remove('hidden');
                            
                            const alertBox = document.getElementById('player-action-alert');
                            if (hasPendingAction) { alertBox.classList.remove('hidden'); } else { alertBox.classList.add('hidden'); }
                        } else {
                            document.getElementById('player-role-hidden-zone').classList.remove('hidden');
                            document.getElementById('player-role-revealed-zone').classList.add('hidden');
                        }

                        document.getElementById('player-role-display').innerText = `Rolle: ${me.role}`;
                        let displayDesc = roleDescriptions[me.role] || "";

                        if (me.role === "Mellemleder") {
                            const others = Object.keys(players).filter(id => id !== myPlayerId && players[id].role === "Mellemleder").map(id => players[id].name);
                            displayDesc += "\n\n🤫 Andre mellemledere: " + (others.length > 0 ? others.join(", ") : "Ingen");
                        }

                        // OMRAADE-DIREKTØR ZONE
                        if (me.role === "Områdedirektør" && !scapegoatId) {
                            document.getElementById('player-od-zone').classList.remove('hidden');
                            let opts = `<option value="">-- Vælg en ansat --</option>` + Object.keys(players).filter(id => id !== myPlayerId && players[id].isAlive).map(id => `<option value="${id}">${players[id].name}</option>`).join('');
                            document.getElementById('player-od-zone').innerHTML = `
                                <div style="font-weight:bold; margin-bottom:8px;">👑 Vælg din Syndebuk:</div>
                                <select id="od-target-select" style="margin-bottom:8px; color:#fff;">${opts}</select>
                                <button onclick="odChooseScapegoat()" class="btn-amber">Udnævn Syndebuk</button>
                            `;
                        } else { document.getElementById('player-od-zone').classList.add('hidden'); }

                        // DITTE ZONE
                        if (me.role === "Ditte" && !ditteChoiceDone) {
                            document.getElementById('player-ditte-zone').classList.remove('hidden');
                            let opts = `<option value="">-- Vælg en ansat --</option>` + Object.keys(players).filter(id => id !== myPlayerId && players[id].role === "Medarbejder" && players[id].isAlive).map(id => `<option value="${id}">${players[id].name}</option>`).join('');
                            document.getElementById('player-ditte-zone').innerHTML = `
                                <div style="font-weight:bold; margin-bottom:8px;">📣 Udnævn ekstra Mellemleder:</div>
                                <select id="ditte-target-select" style="margin-bottom:8px; color:#fff;">${opts}</select>
                                <button onclick="ditteChooseManager()" class="btn-amber">Udnævn Mellemleder</button>
                            `;
                        } else { document.getElementById('player-ditte-zone').classList.add('hidden'); }

                        // JULEFROKOST ZONE
                        if (me.role === "Julefrokostpar" && !data.loveDeclared) {
                            document.getElementById('player-couple-zone').classList.remove('hidden');
                            let opts = `<option value="">-- Vælg hvem du knaldede med --</option>` + Object.keys(players).filter(id => id !== myPlayerId && players[id].isAlive).map(id => `<option value="${id}">${players[id].name}</option>`).join('');
                            document.getElementById('player-couple-zone').innerHTML = `
                                <div style="font-weight:bold; margin-bottom:8px;">❤️ Erklær Kærlighed (Valgfrit):</div>
                                <select id="couple-target-select" style="margin-bottom:8px; color:#fff;">${opts}</select>
                                <button onclick="declareLove()" style="background:#f43f5e;">Erklær Kærlighed!</button>
                            `;
                        } else { document.getElementById('player-couple-zone').classList.add('hidden'); }

                        document.getElementById('player-role-desc').innerText = displayDesc;
                    }
                } else {
                    document.getElementById('player-status-alive').classList.add('hidden');
                    document.getElementById('player-status-dead').classList.remove('hidden');
                }
            }

            // --- 2. GENERALDIREKTØR INTERFACE ---
            if (viewMode === 'gd') {
                document.getElementById('gd-setup-zone').classList.add('hidden');
                document.getElementById('gd-approval-zone').classList.add('hidden');
                document.getElementById('gd-day-zone').classList.add('hidden');
                document.getElementById('gd-night-zone').classList.add('hidden');

                if (status.phase === "SETUP" || !status.phase) {
                    document.getElementById('gd-setup-zone').classList.remove('hidden');
                    document.getElementById('gd-lobby-list').innerHTML = Object.keys(players).map(id => `<li>🟢 ${players[id].name}</li>`).join('') || "<li>Venter på ansatte...</li>";
                } 
                else if (status.phase === "LOBBY_APPROVAL") {
                    document.getElementById('gd-approval-zone').classList.remove('hidden');
                    let apList = document.getElementById('gd-approval-list');
                    apList.innerHTML = "";
                    Object.keys(players).forEach(id => {
                        let sel = `<select onchange="gdChangeRole('${id}', this.value)" style="padding:6px; margin:0; width:auto;">`;
                        allAvailableRoles.forEach(r => {
                            sel += `<option value="${r}" ${players[id].role === r ? 'selected' : ''}>${r}</option>`;
                        });
                        sel += `</select>`;
                        apList.innerHTML += `<div class="card flex-row" style="padding:10px;"><strong>${players[id].name}</strong> ${sel}</div>`;
                    });
                }
                else if (status.phase === "SINDEDAG (DAG)") {
                    document.getElementById('gd-day-zone').classList.remove('hidden');
                    
                    let selectHtml = '<option value="">-- Vælg Person --</option>';
                    Object.keys(players).filter(id => players[id].isAlive).forEach(id => {
                        selectHtml += `<option value="${id}">${players[id].name} (${players[id].role})</option>`;
                    });
                    document.getElementById('gd-fire-select').innerHTML = selectHtml;
                    document.getElementById('gd-shield-select').innerHTML = selectHtml;
                    
                    // Bestyrelses dropdown
                    let bmOpts = '<option value="">-- Vælg Person --</option>';
                    Object.keys(players).filter(id => players[id].isAlive).forEach(id => {
                        bmOpts += `<option value="${id}">${players[id].name}</option>`;
                    });
                    document.getElementById('gd-bm-select').innerHTML = bmOpts;

                    // Organizations diagram rendering
                    let listHtml = "";
                    Object.keys(players).forEach(id => {
                        const p = players[id];
                        let badges = "";
                        if(id === boardMemberId) badges += '<span class="badge-title">Bestyrelse</span>';
                        if(id === status.tjenestemandId) badges += '🛡️';
                        listHtml += `<div class="card flex-row" style="padding:10px; margin-bottom:6px;"><div><strong>${p.name}</strong> ${badges}</div> <div style="font-size:13px;">${p.role} ${p.isAlive?'':'❌'}</div></div>`;
                    });
                    document.getElementById('gd-day-player-list').innerHTML = listHtml;
                }
                else if (status.phase === "MELLEMLEDERSEMINAR (NAT)") {
                    document.getElementById('gd-night-zone').classList.remove('hidden');
                    
                    let selectHtml = '<option value="">-- Vælg Person --</option>';
                    Object.keys(players).filter(id => players[id].isAlive).forEach(id => {
                        selectHtml += `<option value="${id}">${players[id].name} (${players[id].role})</option>`;
                    });
                    document.getElementById('gd-night-fire-select').innerHTML = selectHtml;

                    let nsHtml = '<option value="">-- Vælg Normal Ansats --</option>';
                    Object.keys(players).filter(id => players[id].isAlive && players[id].role !== "Mellemleder" && players[id].role !== "Ditte").forEach(id => {
                        nsHtml += `<option value="${id}">${players[id].name} (${players[id].role})</option>`;
                    });
                    document.getElementById('gd-strategy-select').innerHTML = nsHtml;

                    let aliveRoles = Object.keys(players).filter(id => players[id].isAlive).map(id => players[id].role);
                    let wakeHtml = "";
                    if(aliveRoles.includes('Ditte') && !ditteChoiceDone) wakeHtml += `<li>📣 <strong>Ditte</strong> (Udpeger Mellemleder)</li>`;
                    if(aliveRoles.includes('Områdedirektør') && !scapegoatId) wakeHtml += `<li>👑 <strong>Områdedirektør</strong> (Udpeger Syndebuk)</li>`;
                    if(aliveRoles.includes('Mellemleder')) wakeHtml += `<li>💼 <strong>Mellemlederne</strong> (Aftaler fyring) <br><small>Tillidsrepræsentant kigger måske.</small></li>`;
                    if(aliveRoles.includes('HR Medarbejder')) wakeHtml += `<li>📋 <strong>HR Medarbejder</strong> (Tjekker 1 mappe)</li>`;
                    if(aliveRoles.includes('Den eksterne konsulent fra PWC')) {
                        wakeHtml += `<li>🕵️‍♂️ <strong>PWC Konsulent</strong> <div><label><input type="checkbox" ${status.usedPWC ? 'checked' : ''} onchange="gdTogglePWC(this.checked)"> Brugt evne?</label></div></li>`;
                    }
                    if(wakeHtml === "") wakeHtml = "<li>Ingen special-roller tilbage at vække.</li>";
                    document.getElementById('gd-wakeup-list').innerHTML = wakeHtml;

                    if (status.tjenestemandId && players[status.tjenestemandId]) {
                        document.getElementById('gd-night-shield-info').innerHTML = `⚠️ <strong>${players[status.tjenestemandId].name}</strong> har Tjenestemandsskjoldet i nat!`;
                    } else {
                        document.getElementById('gd-night-shield-info').innerHTML = "";
                    }
                }
            }

            // --- 3. STORSKÆRM INTERFACE ---
            if (viewMode === 'screen') {
                const screenList = document.getElementById('screen-player-list');
                
                if (status.phase === "MELLEMLEDERSEMINAR (NAT)") {
                    document.getElementById('screen-night-overlay').classList.remove('hidden');
                } else {
                    document.getElementById('screen-night-overlay').classList.add('hidden');
                }

                if (screenList) {
                    screenList.innerHTML = "";
                    Object.keys(players).forEach(id => {
                        const p = players[id];
                        let statusText = p.isAlive ? "🟢 Aktiv" : "❌ FYRET";
                        if (!p.isAlive && boardMemberRevealed) statusText = `❌ FYRET (${p.role})`;
                        
                        let badges = "";
                        if(id === boardMemberId) badges += '<span class="badge-title">Bestyrelse</span>';
                        if(id === status.tjenestemandId) badges += '<span style="margin-left:8px;" title="Tjenestemandsskjold">🛡️</span>';

                        screenList.innerHTML += `
                            <div class="card flex-row" style="margin-bottom:8px; padding:12px; background: rgba(255,255,255,0.02)">
                                <div><strong style="font-size:16px;">${p.name}</strong>${badges}</div>
                                <div style="font-size:14px; font-weight:bold; color:${p.isAlive ? '#10b981' : 'var(--color-danger)'}">${statusText}</div>
                            </div>
                        `;
                    });
                }
            }

            const chatKeys = Object.keys(chat);
            if (chatKeys.length > 0) {
                const latestMsg = chat[chatKeys[chatKeys.length - 1]];
                if (document.getElementById('player-latest-msg')) document.getElementById('player-latest-msg').innerHTML = `<span style="color:#6bf; font-weight:bold;">${latestMsg.from}:</span> ${latestMsg.msg}`;
            }

            ['screen-linkedin-feed', 'player-linkedin-feed'].forEach(cId => {
                const container = document.getElementById(cId);
                if(container) {
                    container.innerHTML = "";
                    Object.keys(chat).reverse().forEach(key => {
                        container.innerHTML += `<div class="li-post"><div class="li-name">🔗 ${chat[key].from}</div><div class="li-text">${chat[key].msg}</div></div>`;
                    });
                }
            });
        }

            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            set(ref(db, `rooms/${currentRoom}`), {

                boardMemberId: "", boardMemberRevealed: false, loveDeclared: false, ditteChoiceDone: false, scapegoatId: ""
            });
        };

        window.distributeRolesAndStart = function(isReshuffle = false) {
            const playerIds = Object.keys(globalPlayers);
            if(playerIds.length === 0) return alert("Der er ingen spillere i lobbyen!");

            let rolePool = [];
            const mlCount = parseInt(document.getElementById('setup-count-ml').value) || 0;
            for(let i=0; i < mlCount; i++) rolePool.push("Mellemleder");

            const simpleRoles = ['Praktikant', 'Kåre', 'HR Medarbejder', 'Områdedirektør', 'Tillidsrepræsentant', 'PWC', 'Ditte'];
            simpleRoles.forEach(r => { if(document.getElementById(`setup-role-${r.replace(/ /g, '')}`)?.checked) rolePool.push(r === 'PWC' ? 'Den eksterne konsulent fra PWC' : r); });
            if(document.getElementById('setup-role-Julefrokostparret')?.checked) { rolePool.push("Julefrokostpar"); rolePool.push("Julefrokostpar"); }

            while(rolePool.length < playerIds.length) rolePool.push("Medarbejder");
            for (let i = rolePool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [rolePool[i], rolePool[j]] = [rolePool[j], rolePool[i]]; }

            playerIds.forEach((id, index) => { update(ref(db, `rooms/${currentRoom}/players/${id}`), { role: rolePool[index], isAlive: true }); });
            update(ref(db, `rooms/${currentRoom}/status`), { phase: "LOBBY_APPROVAL" });
        };

        window.gdChangeRole = function(pId, newRole) { update(ref(db, `rooms/${currentRoom}/players/${pId}`), { role: newRole }); };

        window.gdGoToPhase = function(newPhase) {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            
            get(ref(db, `rooms/${currentRoom}`)).then(snap => {
                let rData = snap.val() || {};
                let aliveCount = 0;
                if(rData.players) {
                    aliveCount = Object.values(rData.players).filter(p => p.isAlive).length;
                }
                
                // DYNAMISK TID: 30s pr. aktiv spiller
                let defaultTimer = 180;
                if(newPhase === "SINDEDAG (DAG)") {
                    defaultTimer = aliveCount * 30;
                }

                let payload = { phase: newPhase, timer: defaultTimer, timerRunning: false };
                if (newPhase === "SINDEDAG (DAG)") payload.tjenestemandId = ""; 
                update(ref(db, `rooms/${currentRoom}/status`), payload);
            });
        };

        window.gdAssignShield = function() {
            const tId = document.getElementById('gd-shield-select').value;
            if(!tId) return;
            update(ref(db, `rooms/${currentRoom}/status`), { tjenestemandId: tId });
            alert("Skjold tildelt!");
        };

        // Fyr funktionen håndterer nu både Dag og Nat dropdowns
        window.gdFirePlayer = function(selectId = 'gd-fire-select') {
            const pId = document.getElementById(selectId).value;
            if(!pId) return;
            
            get(ref(db, `rooms/${currentRoom}`)).then(snap => {
                const roomData = snap.val() || {};
                const status = roomData.status || {};
                const phase = status.phase || "";
                const shieldId = status.tjenestemandId || "";
                const scapegoatId = roomData.scapegoatId || "";
                const targetPlayer = roomData.players[pId] || {};

                if(shieldId === pId && phase === "MELLEMLEDERSEMINAR (NAT)") {
                    return alert("⚠️ Denne person er beskyttet af Tjenestemandsskjoldet i nat og KAN IKKE fyres!");
                }
                
                if(phase === "MELLEMLEDERSEMINAR (NAT)" && targetPlayer.role === "Praktikant") {
                    return alert("⚠️ Denne person er Praktikant og er IMMUN overfor natlige fyringer!");
                }

                if(phase === "MELLEMLEDERSEMINAR (NAT)" && targetPlayer.role === "Områdedirektør" && scapegoatId) {
                    const scapegoat = roomData.players[scapegoatId];
                    if (scapegoat && scapegoat.isAlive) {
                        alert(`⚠️ Områdedirektøren er immun! De har i stedet udpeget ${scapegoat.name} som syndebuk.\nSyndebukken fyres nu automatisk i stedet!`);
                        update(ref(db, `rooms/${currentRoom}/players/${scapegoatId}`), { isAlive: false });
                        return;
                    }
                }

                update(ref(db, `rooms/${currentRoom}/players/${pId}`), { isAlive: false });
                
                if(targetPlayer.role === "Kåre") {
                    alert(`🤯 ${targetPlayer.name} (KÅRE) ER BLEVET FYRET!\nKåre har netop vundet spillet, fordi det var hans skjulte mission!`);
                }
            });
        };
